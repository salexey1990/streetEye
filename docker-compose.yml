version: '3.8'

services:
  # ===========================================
  # Challenge Service Databases
  # ===========================================

  # Main database for challenge-service (port 5434)
  challenge-service-db:
    image: postgres:15-alpine
    container_name: challenge-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge_db
    ports:
      - "5434:5432"
    volumes:
      - challenge-service-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d challenge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streetEye-network

  # Test database for challenge-service (port 5435)
  challenge-service-db-test:
    image: postgres:15-alpine
    container_name: challenge-service-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge_db_test
    ports:
      - "5435:5432"
    volumes:
      - challenge-service-postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d challenge_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streetEye-network

  # ===========================================
  # Content Service Databases
  # ===========================================

  # Main database for content-service (port 5432)
  content-service-db:
    image: postgres:15-alpine
    container_name: content-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_db
    ports:
      - "5432:5432"
    volumes:
      - content-service-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streetEye-network

  # Test database for content-service (port 5433)
  content-service-db-test:
    image: postgres:15-alpine
    container_name: content-service-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_db_test
    ports:
      - "5433:5432"
    volumes:
      - content-service-postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streetEye-network

  # ===========================================
  # API Service Databases (placeholder)
  # ===========================================
  # Uncomment and configure when api needs a database
  # api-db:
  #   image: postgres:15-alpine
  #   container_name: api-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: api_db
  #   ports:
  #     - "5434:5432"
  #   volumes:
  #     - api-postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d api_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - streetEye-network

  # ===========================================
  # Future Services Databases (placeholder)
  # ===========================================
  # Add new service databases here following the pattern:
  # - service-name-db (main database)
  # - service-name-db-test (test database)
  # Use unique ports and database names

volumes:
  challenge-service-postgres_data:
    driver: local
  challenge-service-postgres_test_data:
    driver: local
  content-service-postgres_data:
    driver: local
  content-service-postgres_test_data:
    driver: local
  # api-postgres_data:
  #   driver: local

networks:
  streetEye-network:
    driver: bridge
